<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpath - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="logo">🚀 Launchpath</div>

        <ul class="nav-links">
            <li><a href="homepage.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Internship <span class="highlight">Launchpath</span></h1>
            <p>
                Launch your journey toward internships, growth, and real opportunities.
            </p>
            <div class="auth-actions" style="max-width: 320px;">
                <a href="student-register.php" class="auth-link-btn">Register as Student</a>
                <a href="company-register.html" class="auth-link-btn">Register as Company</a>
            </div>
        </div>

        <div class="form-box">
            <h2>Login</h2>

            <p id="login-error" class="switch-text" style="color:#ffcf7a; display:none;"></p>

            <form action="login.php" method="post">
                <input type="email" name="email" placeholder="Enter Email" required>
                <input type="password" name="password" placeholder="Enter Password" required>

                <div class="role-box">
                    <p>Login as:</p>
                    <div class="role-options">
                        <label>
                            <input type="radio" name="user_type" value="student" required>
                            Student
                        </label>
                        <label>
                            <input type="radio" name="user_type" value="company" required>
                            Company
                        </label>
                    </div>
                </div>

                <button type="submit" class="form-btn">Login</button>
            </form>

            <p class="switch-text">
                Don’t have an account?
                Choose the correct registration button above.
            </p>
        </div>
    </section>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            const errorBox = document.getElementById('login-error');

            if (!error || !errorBox) {
                return;
            }

            const messages = {
                missing_fields: 'Please enter your email, password, and role.',
                server_error: 'A server error occurred. Please try again.',
                invalid_credentials: 'No matching account was found. Check your email and password or register first.',
                invalid_role: 'Please choose Student or Company before logging in.',
                invalid_session: 'Your session is invalid. Please log in again.',
                student_not_found: 'Your student account was not found. Please register first.'
            };

            errorBox.textContent = messages[error] || 'Login failed. Please try again.';
            errorBox.style.display = 'block';
        })();
    </script>

</body>
</html>
