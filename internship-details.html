<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <title>profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="company-dashboard-page">

    <nav class="company-dashboard-navbar">
        <div class="company-profile-logo">🚀 Launchpath</div>

        <ul class="company-profile-links">
            <li><a href="student-home.html">Home</a></li>
            <li><a href="student-dashboard.html">Dashboard</a></li>
            <li><a href="login.html">Logout</a></li>
        </ul>
    </nav>

    <main class="company-profile-container">

       <section class="company-profile-hero">
    <h1 id="title"></h1>
    <p>View internship details and upload CV</p>
</section>

<section class="company-profile-card">

    <div class="company-profile-left">
        <div class="company-profile-image">
            <img id="image" src="./images/default.png" alt="internship image">
        </div>
        <h2 id="name"></h2>
    </div>

    <div class="company-profile-right">
        <h2>Internship Information</h2>

        <div class="profile-row">
            <span class="profile-label">Duration</span>
            <span class="profile-value" id="duration"></span>
        </div>

        <div class="profile-row">
            <span class="profile-label">Description</span>
            <span class="profile-value" id="description"></span>
        </div>

        <div class="profile-row">
            <span class="profile-label">Start Date</span>
            <span class="profile-value" id="startDate"></span>
        </div>

        <div class="profile-row">
            <span class="profile-label">Location</span>
            <span class="profile-value" id="location"></span>
        </div>

        <div class="profile-row">
            <span class="profile-label">Field / Industry</span>
            <span class="profile-value" id="field"></span>
        </div>

        <div class="company-profile-buttons">
            <label for="cvUpload" class="profile-btn">Apply (Upload CV)</label>
<input type="file" id="cvUpload" accept=".pdf,.doc,.docx" hidden>
<p id="uploadStatus"></p>
            <a href="Available-Internships.html" class="profile-btn">Back to Dashboard</a>
        </div>
    </div>

</section>

<script>

const id = params.get("id");

    },

    6: {

    },
    7: {
        title: "Cloud Computing Internship",

    },
    8: {
        title: "Game Development Internship",
        field: "Unity & C#",

        description: "Create interactive games using Unity. Learn game mechanics, physics, and rendering while working on exciting real-time projects."
    },
    9: {
        title: "Digital Marketing Internship",
        field: "SEO & Social Media",

    10: {

const internship = internships[id];

if (internship) {
    document.getElementById("title").innerText = internship.title;
    document.getElementById("name").innerText = internship.title;
    document.getElementById("field").innerText = internship.field;
    document.getElementById("duration").innerText = internship.duration;
    document.getElementById("startDate").innerText = internship.startDate;
    document.getElementById("location").innerText = internship.location;
    document.getElementById("description").innerText = internship.description;
}
</script>
<script>
const fileInput = document.getElementById("cvUpload");
const statusText = document.getElementById("uploadStatus");

fileInput.addEventListener("change", function () {
    const file = fileInput.files[0];

    if (file) {
        const allowedTypes = ["application/pdf", 
                              "application/msword", 
                              "application/vnd.openxmlformats-officedocument.wordprocessingml.document"];

        if (!allowedTypes.includes(file.type)) {
            statusText.style.color = "red";
            statusText.innerText = "❌ Only PDF or Word files allowed.";
            return;
        }

        if (file.size > 2 * 1024 * 1024) {
            statusText.style.color = "red";
            statusText.innerText = "❌ File too large (max 2MB).";
            return;
        }

        statusText.style.color = "green";
        statusText.innerText = "✅ CV uploaded successfully: " + file.name;
    }
});
</script>
    </main>

</body>
</html>
