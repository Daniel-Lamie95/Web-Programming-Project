<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Internship Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="company-profile-page">

    <nav class="company-profile-navbar">
        <div class="company-profile-logo">🚀 Launchpad</div>

        <ul class="company-profile-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="Available-Internships.html">Dashboard</a></li>
            <li><a href="login.html">Logout</a></li>
        </ul>
    </nav>

    <main class="company-profile-container">

        <section class="company-profile-hero">
            <h1>Edit Internship Profile</h1>
            <p>Update Internship information.</p>
        </section>

        <section class="company-profile-card">

            <div class="company-profile-left">
                <div class="company-profile-image">
                    <img src="images/main_logo.jpeg" alt="Company Logo">
                </div>
                <h2>Tech Company</h2>
                <span>Software Development</span>
            </div>

            <div class="company-profile-right">
                <h2>Edit Internship</h2>

                <form method="POST" action="">

                    <div class="profile-row">
                        <label class="profile-label" for="duration">Duration</label>
                        <input type="text" id="duration" name="duration" value="3 Months">
                    </div>

                    <div class="profile-row description-row">
                        <label class="profile-label" for="description">Description</label>
                        <textarea id="description" name="description" rows="5">Work on building responsive and modern user interfaces using HTML, CSS, and JavaScript. You will collaborate with designers and backend developers to create real-world applications and improve user experience across multiple platforms.</textarea>
                    </div>

                    <div class="profile-row">
                        <label class="profile-label" for="startDate">Start Date</label>
                        <input type="date" id="startDate" name="startDate" value="2026-06-10">
                    </div>

                    <div class="profile-row">
                        <label class="profile-label" for="location">Location</label>
                        <input type="text" id="location" name="location" value="Cairo, Egypt">
                    </div>

                    <div class="profile-row">
                        <label class="profile-label" for="field">Field / Industry</label>
                        <input type="text" id="field" name="field" value="Web Development">
                    </div>

                    <div class="company-profile-buttons">
                        <a href="company-profile.html" class="profile-btn">Cancel</a>
                        <button type="submit" class="profile-btn">Save Changes</button>
                    </div>

                </form>
            </div>

        </section>

    </main>

</body>
</html>
